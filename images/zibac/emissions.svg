<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Segoe UI,Arial,sans-serif"><rect width="700" height="400" fill="white"/><text x="30" y="42" font-size="17" font-weight="700" fill="#15171A">Relative emissions (illustrative) — diesel = 100</text><text x="120" y="111" text-anchor="end" font-size="16" fill="#15171A">CNG</text><rect x="140" y="90" width="258" height="32" rx="4" fill="#4A4F57"/><text x="410" y="112" font-size="16" font-weight="700" fill="#15171A">55</text><text x="120" y="179" text-anchor="end" font-size="16" fill="#15171A">LNG</text><rect x="140" y="158" width="282" height="32" rx="4" fill="#C8102E"/><text x="434" y="180" font-size="16" font-weight="700" fill="#15171A">60</text><text x="120" y="247" text-anchor="end" font-size="16" fill="#15171A">LPG</text><rect x="140" y="226" width="352" height="32" rx="4" fill="#8b929b"/><text x="504" y="248" font-size="16" font-weight="700" fill="#15171A">75</text><text x="120" y="315" text-anchor="end" font-size="16" fill="#15171A">Diesel</text><rect x="140" y="294" width="470" height="32" rx="4" fill="#3a3f46"/><text x="622" y="316" font-size="16" font-weight="700" fill="#15171A">100</text><text x="30" y="382" font-size="12" fill="#4A4F57">Lower CO₂, NOx, SOx and particulates for natural gas (LNG/CNG) vs petroleum liquids</text></svg>